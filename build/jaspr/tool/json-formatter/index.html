    <style>
      .tabs .tab-content {
        display: none;
      }
      .tabs .tab-content[active] {
        display: initial;
      }
      .tab-bar {
        display: flex;
        border-bottom-style: solid;
        border-bottom-color: var(--content-hr);
        border-bottom-width: 1px;
        align-items: center;
        column-gap: 1.25rem;
      }
      .tab-bar button {
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
        border-bottom-style: solid;
        border-bottom-color: transparent;
        border-bottom-width: 2px;
        font-weight: 700;
      }
      .tab-bar button:hover {
        border-bottom-color: var(--content-hr);
      }
      .tab-bar button[active] {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }
      .main {
        display: flex;
        position: relative;
        z-index: 1;
        flex-direction: column;
      }
    </style>

  <body>
    <script>
              (function () {
                try {

        <section class="glass-wrap">

            <button class="btn-secondary">Clear</button>
