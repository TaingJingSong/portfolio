<!DOCTYPE html>
<html>
<head>
  <base href="/portfolio/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My personal portfolio.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.ico"/>
  <title>Taing ChingSong</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles/star-style.css">

  <style>
    #loading_indicator {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background-color: #282C33;
      z-index: 9999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loading_indicator.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .indicator {
      width: 180px;
      height: 180px;
      object-fit: contain;
      animation: fadeIn 0.6s ease forwards;
    }

    .progress-track {
      width: 140px;
      height: 3px;
      background-color: #3a3f47;
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background-color: #C8A96E;
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .loading-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #6b7280;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>
  <script>
    (function () {
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light');
        }
      } catch (e) {}
    })();
  </script>

  <!-- Star Background -->
  <div class="star-background">
    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div>

  <!-- Loading Splash Screen -->
  <div id="loading_indicator">
    <!-- Load the splash gif from web assets -->
    <img class="indicator" src="assets/splash_logo.gif" alt="Loading"/>
    <div class="progress-track">
      <div class="progress-fill" id="progress_fill"></div>
    </div>
    <span class="loading-label">Loading...</span>
  </div>

  <!-- Mouse Glow Cursor -->
  <div id="cursor-glow"></div>

  <!-- Smooth JavaScript cursor glow listener -->
  <script>
    document.addEventListener('mousemove', (e) => {
      const glow = document.getElementById('cursor-glow');
      if (glow) {
        glow.style.top = e.clientY + 'px';
        glow.style.left = e.clientX + 'px';
      }
    });
  </script>

  <!-- Progress bar simulator and dismiss script -->
  <script>
    (function () {
      const fill = document.getElementById('progress_fill');
      const loader = document.getElementById('loading_indicator');
      let progress = 0;
      const MAX_AUTO = 90;

      const interval = setInterval(() => {
        const step = Math.random() * 10 + 2;
        progress = Math.min(progress + step, MAX_AUTO);
        if (fill) fill.style.width = progress + '%';
        if (progress >= MAX_AUTO) clearInterval(interval);
      }, 200);

      window.dismissLoader = function() {
        clearInterval(interval);
        if (fill) fill.style.width = '100%';
        setTimeout(() => {
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 500);
          }
        }, 200);
      };

      // Fallback: dismiss after 5 seconds
      setTimeout(window.dismissLoader, 5000);
    })();
  </script>

  <!-- Jaspr entrypoint script -->
  <script defer src="main.dart.js"></script>

</body>
</html>
